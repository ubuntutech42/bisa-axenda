name: CI

on:
  push:
    branches:
      - main
      - test
      - production
  pull_request:
    branches:
      - main
      - test

jobs:
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy-staging:
    name: Deploy para Homologação (test)
    needs: quality
    if: github.ref == 'refs/heads/test' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Autenticar no Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Criar rollout no App Hosting (staging)
        run: |
          firebase apphosting:rollouts:create ${{ secrets.APPHOSTING_BACKEND_ID_STAGING }} \
            --git-branch test \
            --project ${{ secrets.FIREBASE_PROJECT_ID_STAGING }} \
            --non-interactive
